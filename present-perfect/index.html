<script>
// ─── PARTICLE SYSTEM ─────────────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const P = [];
  for (let i = 0; i < 55; i++) {
    P.push({ x: Math.random()*1400, y: Math.random()*900, r: Math.random()*2.5+0.5,
      speed: Math.random()*0.35+0.08, drift: (Math.random()-0.5)*0.25,
      op: Math.random()*0.5+0.1, col: Math.random()>0.5?'200,140,40':'255,130,20',
      life: Math.random() });
  }
  function tick() {
    ctx.clearRect(0,0,W,H);
    P.forEach(p => {
      p.life += 0.004; if(p.life>1){p.life=0;p.x=Math.random()*W;p.y=H+10;}
      p.y -= p.speed; p.x += p.drift;
      const a = Math.sin(p.life*Math.PI);
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2);
      ctx.fillStyle = 'rgba('+p.col+','+p.op*a*0.5+')'; ctx.fill();
    });
    requestAnimationFrame(tick);
  }
  tick();
})();

// ─── CONFETTI ────────────────────────────────────────────────────────────────
window.triggerConfetti = function() {
  const cv = document.createElement('canvas');
  cv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  document.body.appendChild(cv);
  const c = cv.getContext('2d');
  const cols = ['#f0c060','#ff8c00','#ffd700','#5a9c4a','#90d080','#f0e6d3','#ff6b00','#c8a45e'];
  const pieces = Array.from({length:90},()=>({
    x:Math.random()*cv.width, y:-20,
    w:Math.random()*10+4, h:Math.random()*5+2,
    rot:Math.random()*360, rs:(Math.random()-0.5)*9,
    sp:Math.random()*3+1.5, dr:(Math.random()-0.5)*1.5,
    col:cols[Math.floor(Math.random()*cols.length)], op:1
  }));
  let f=0;
  function draw(){
    c.clearRect(0,0,cv.width,cv.height);
    pieces.forEach(p=>{
      p.y+=p.sp; p.x+=p.dr; p.rot+=p.rs;
      if(p.y>cv.height*0.75) p.op*=0.97;
      c.save(); c.translate(p.x,p.y); c.rotate(p.rot*Math.PI/180);
      c.fillStyle=p.col; c.globalAlpha=p.op;
      c.fillRect(-p.w/2,-p.h/2,p.w,p.h); c.restore();
    });
    if(++f<200) requestAnimationFrame(draw); else cv.remove();
  }
  draw();
};

// ─── AUTO-CONFETTI ────────────────────────────────────────────────────────────
const _obs = new MutationObserver(muts=>{
  muts.forEach(m=>m.addedNodes.forEach(n=>{
    if(n.nodeType===1&&n.classList&&n.classList.contains('feedback-box')&&n.classList.contains('correct'))
      setTimeout(window.triggerConfetti,150);
  }));
});
setTimeout(()=>_obs.observe(document.getElementById('root'),{childList:true,subtree:true}),200);
